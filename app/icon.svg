<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3535"/>
      <stop offset="45%" stop-color="#d42b2b"/>
      <stop offset="100%" stop-color="#6b0808"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#d42b2b" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- Outer void circle -->
  <circle cx="50" cy="50" r="50" fill="#080810"/>

  <!-- Subtle outer glow halo -->
  <circle cx="50" cy="50" r="50" fill="url(#glowGrad)"/>

  <!-- Red iris -->
  <circle cx="50" cy="50" r="44" fill="url(#irisGrad)"/>

  <!-- Mangekyō blades — 3 dark sectors at 120° intervals, 90° each, 30° red gaps between -->
  <g fill="#080810">
    <!-- Blade spanning 245° → 335° (top of circle) -->
    <path d="M50,50 L32.3,11.9 A42,42 0 0,1 88.1,32.3 Z"/>
    <path d="M50,50 L32.3,11.9 A42,42 0 0,1 88.1,32.3 Z" transform="rotate(120,50,50)"/>
    <path d="M50,50 L32.3,11.9 A42,42 0 0,1 88.1,32.3 Z" transform="rotate(240,50,50)"/>
  </g>

  <!-- Thin dark outer iris ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#080810" stroke-width="2.5"/>

  <!-- Inner iris ring (the ring surrounding the pupil) -->
  <circle cx="50" cy="50" r="16.5" fill="url(#irisGrad)"/>

  <!-- Inner ring border -->
  <circle cx="50" cy="50" r="16.5" fill="none" stroke="#080810" stroke-width="1.5"/>

  <!-- Pupil -->
  <circle cx="50" cy="50" r="9" fill="#080810"/>

  <!-- Pupil edge accent -->
  <circle cx="50" cy="50" r="9" fill="none" stroke="#d42b2b" stroke-width="0.8" stroke-opacity="0.6"/>
</svg>
